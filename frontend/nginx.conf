worker_processes auto;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    server {
        listen 80;
        server_name bc-portal-dev.tanuh.ai;
        return 301 https://$host$request_uri;
    }

    upstream backend_pool {
        server backend:8000;
        keepalive 32;
    }

    server {
        listen 443 ssl;
        server_name bc-portal-dev.tanuh.ai;

        ssl_certificate /etc/letsencrypt/live/bc-portal-dev.tanuh.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bc-portal-dev.tanuh.ai/privkey.pem;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        gzip on;
        gzip_types application/json text/css application/javascript text/plain application/manifest+json image/svg+xml;
        gzip_min_length 256;
        gzip_vary on;

        root /usr/share/nginx/html;
        index index.html;

        location /service-worker.js {
            add_header Cache-Control "no-cache";
            try_files $uri =404;
        }

        location /static/ {
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        location /manifest.json {
            add_header Cache-Control "public, max-age=86400";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size 150M;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
        }
    }
}
