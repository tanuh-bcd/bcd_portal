services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bcd-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    networks:
      - bcdnet
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
        reservations:
          memory: 512m
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
    container_name: bcd-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    networks:
      - bcdnet
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
        reservations:
          memory: 128m
          cpus: "0.1"

networks:
  bcdnet:
    driver: bridge
